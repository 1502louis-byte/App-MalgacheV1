<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Malgache">
<meta name="theme-color" content="#6C63FF">
<link rel="manifest" href="manifest.json">

<title>Apprendre le Malgache 🇲🇬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1117; --surf: #1A1D27; --surf2: #22263A; --surf3: #2A2D3A;
  --text: #E8EAF0; --muted: #8B91A8; --accent: #6C63FF;
  --red: #FF6B6B; --teal: #4ECDC4; --yellow: #FFD93D; --green: #6BCB77;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Nunito', sans-serif; color: var(--text); display: flex; flex-direction: column; }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.screen { flex: 1; overflow-y: auto; padding: 0 16px calc(80px + var(--safe-bot)); -webkit-overflow-scrolling: touch; }
.screen::-webkit-scrollbar { display: none; }

/* BOTTOM NAV */
#nav { display: flex; background: var(--surf); border-top: 1px solid var(--surf3);
  padding: 8px 0 calc(8px + var(--safe-bot)); flex-shrink: 0; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit;
  font-size: 10px; font-weight: 700; padding: 4px 0; transition: color .2s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; }

/* HEADER */
.page-header { padding: calc(var(--safe-top) + 16px) 0 12px; position: sticky; top: 0;
  background: var(--bg); z-index: 10; }
.page-title { font-size: 22px; font-weight: 900; }
.page-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

/* HOME */
.hero { background: linear-gradient(135deg, var(--surf) 0%, var(--surf2) 100%);
  border-radius: 20px; padding: 20px; margin: calc(var(--safe-top) + 16px) 0 16px; }
.hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.hero-flag { font-size: 44px; }
.hero-title { font-size: 26px; font-weight: 900;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-sub { color: var(--muted); font-size: 12px; }
.stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat { flex: 1; background: var(--surf3); border-radius: 12px; padding: 10px 6px;
  text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-val { font-size: 18px; font-weight: 900; }
.stat-lbl { color: var(--muted); font-size: 10px; }
.xp-label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
.xp-track { height: 8px; background: var(--surf3); border-radius: 4px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 4px; transition: width .5s; }

.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.menu-card { background: var(--surf); border: 1px solid var(--surf3); border-radius: 18px;
  padding: 18px 14px; display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
  cursor: pointer; text-align: left; font-family: inherit; color: var(--text);
  transition: transform .15s, box-shadow .15s; position: relative; overflow: hidden; }
.menu-card:active { transform: scale(.97); }
.menu-card-icon { font-size: 30px; }
.menu-card-title { font-size: 15px; font-weight: 800; }
.menu-card-desc { color: var(--muted); font-size: 11px; }
.menu-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 18px 18px 0 0; }

.tip-box { background: var(--surf); border-radius: 14px; padding: 14px;
  display: flex; gap: 10px; align-items: flex-start; }
.tip-text { color: var(--muted); font-size: 13px; line-height: 1.5; }

/* CARDS & LISTS */
.theme-list { display: flex; flex-direction: column; gap: 10px; }
.theme-card { background: var(--surf); border: 1px solid var(--surf3); border-radius: 14px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer;
  text-align: left; font-family: inherit; color: var(--text); width: 100%;
  position: relative; overflow: hidden; transition: transform .15s; }
.theme-card:active { transform: scale(.98); }
.theme-card-icon { font-size: 26px; flex-shrink: 0; }
.theme-card-info { flex: 1; }
.theme-card-title { font-size: 15px; font-weight: 800; }
.theme-card-sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
.theme-progress-mini { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--surf3); }
.theme-progress-fill { height: 100%; border-radius: 0 0 14px 14px; transition: width .5s; }

/* FLASHCARD */
.fc-meta { display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; color: var(--muted); font-size: 13px; }
.fc-track { flex: 1; height: 6px; background: var(--surf2); border-radius: 3px;
  overflow: hidden; margin: 0 10px; }
.fc-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.card-wrap { perspective: 1000px; margin: 8px 0 12px; cursor: pointer; }
.card { background: var(--surf); border-radius: 20px; padding: 40px 24px;
  min-height: 200px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; gap: 10px;
  border-top: 4px solid var(--accent); transition: transform .15s; }
.card:active { transform: scale(.98); }
.card-lang { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.card-word { font-size: 34px; font-weight: 900; line-height: 1.2; }
.card-phonetic { color: var(--yellow); font-size: 15px; font-style: italic; }
.card-translation { font-size: 20px; color: var(--accent); font-weight: 700; }
.card-hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
.card-tag { background: var(--surf2); color: var(--muted); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; }
.phonetic-btn { display: block; margin: 0 auto 12px; background: none;
  border: 1px solid var(--surf3); border-radius: 20px; color: var(--muted);
  cursor: pointer; font-size: 13px; padding: 6px 16px; font-family: inherit; }
.fc-actions { display: flex; gap: 12px; margin-top: 4px; }
.fc-btn { flex: 1; border: 2px solid; border-radius: 14px; padding: 14px 0;
  font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit;
  transition: transform .1s; }
.fc-btn:active { transform: scale(.95); }
.fc-btn-bad { background: #FF6B6B18; border-color: var(--red); color: var(--red); }
.fc-btn-good { background: #4ECDC418; border-color: var(--teal); color: var(--teal); }

/* GRAMMAR */
.lesson-list { display: flex; flex-direction: column; gap: 10px; }
.lesson-row { background: var(--surf); border: 1px solid var(--surf3); border-radius: 14px;
  padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  text-align: left; font-family: inherit; color: var(--text); width: 100%;
  transition: transform .15s; }
.lesson-row:active { transform: scale(.98); }
.lesson-title { font-size: 15px; font-weight: 800; }
.lesson-xp { color: var(--yellow); font-size: 12px; margin-top: 2px; }
.lesson-content { background: var(--surf); border-radius: 20px; padding: 20px; line-height: 1.7; }
.lesson-content h3 { font-size: 15px; margin: 14px 0 4px; }
.lesson-content p { font-size: 14px; color: var(--text); margin: 6px 0; }
.lesson-content .bullet { display: flex; gap: 8px; font-size: 14px; margin: 4px 0; padding-left: 4px; }
.highlight { color: var(--yellow); font-weight: 800; }
.lesson-tip { border-radius: 12px; padding: 12px; display: flex; gap: 8px;
  align-items: flex-start; margin-top: 14px; }
.lesson-tip-text { font-size: 13px; font-weight: 700; }

/* EXERCISE */
.diff-grid { display: flex; flex-direction: column; gap: 12px; margin: 12px 0; }
.diff-btn { background: var(--surf); border: 2px solid var(--surf3); border-radius: 14px;
  padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  font-family: inherit; color: var(--text); font-size: 15px; font-weight: 700;
  text-align: left; width: 100%; transition: border-color .15s; }
.diff-btn.selected { border-color: var(--accent); background: #6C63FF18; }
.diff-info { display: flex; flex-direction: column; }
.diff-sub { color: var(--muted); font-size: 11px; font-weight: 400; margin-top: 2px; }
.ex-progress { height: 6px; background: var(--surf2); border-radius: 3px; overflow: hidden; margin: 8px 0 12px; }
.ex-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 3px; transition: width .4s; }
.score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.q-card { background: var(--surf); border-radius: 20px; padding: 20px; margin-bottom: 14px; }
.q-theme { color: var(--muted); font-size: 12px; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.q-text { font-size: 18px; font-weight: 800; line-height: 1.4; }
.q-original { color: var(--accent); font-size: 14px; margin-top: 8px; font-style: italic; }
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice { background: var(--surf); border: 2px solid var(--surf3); border-radius: 14px;
  padding: 14px 16px; font-family: inherit; color: var(--text); font-size: 15px;
  cursor: pointer; text-align: left; font-weight: 600; transition: all .15s; width: 100%; }
.choice.correct { background: #4ECDC418; border-color: var(--teal); color: var(--teal); }
.choice.wrong { background: #FF6B6B18; border-color: var(--red); color: var(--red); }
.choice:active { transform: scale(.99); }

/* AI EXERCISE */
.ai-box { background: linear-gradient(135deg, #6C63FF18, #4ECDC418);
  border: 1px solid var(--accent); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.ai-title { font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
.ai-sub { color: var(--muted); font-size: 12px; }
.ai-controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.ai-select { background: var(--surf2); border: 1px solid var(--surf3); border-radius: 10px;
  color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; flex: 1; min-width: 120px; }
.loading-dots { display: flex; gap: 6px; justify-content: center; padding: 20px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: bounce .8s infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }

/* RESULT */
.result { display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 70vh; gap: 12px; text-align: center; padding: 0 16px; }
.result-emoji { font-size: 72px; }
.result-title { font-size: 26px; font-weight: 900; }
.result-score { font-size: 56px; font-weight: 900;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.result-xp { color: var(--yellow); font-size: 18px; font-weight: 800; }
.result-msg { color: var(--muted); font-size: 14px; }
.btn-row { display: flex; gap: 10px; width: 100%; max-width: 320px; margin-top: 8px; }

/* BUTTONS */
.btn-primary { background: linear-gradient(90deg, var(--accent), var(--teal)); border: none;
  border-radius: 14px; padding: 16px; font-family: inherit; color: #fff;
  font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; transition: opacity .15s; }
.btn-primary:active { opacity: .85; }
.btn-secondary { background: var(--surf); border: 2px solid var(--surf3); border-radius: 14px;
  padding: 14px; font-family: inherit; color: var(--text); font-size: 15px; font-weight: 700;
  cursor: pointer; flex: 1; }

/* BACK BAR */
.back-bar { display: flex; align-items: center; gap: 10px; padding: calc(var(--safe-top) + 12px) 0 10px;
  position: sticky; top: 0; background: var(--bg); z-index: 10; }
.back-btn { background: none; border: none; color: var(--accent); cursor: pointer;
  font-size: 14px; font-weight: 800; font-family: inherit; padding: 0; display: flex; align-items: center; gap: 4px; }
.back-title { font-size: 18px; font-weight: 900; flex: 1; }
.back-badge { background: var(--surf2); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); }

/* INSTALL BANNER */
.install-banner { background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px; }
.install-text { flex: 1; }
.install-title { font-size: 14px; font-weight: 800; color: #fff; }
.install-sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 2px; }
.install-close { background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; }

/* DONE CHECK */
.done-check { color: var(--teal); font-size: 16px; }
.word-count-badge { background: var(--surf2); border-radius: 20px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
</style>
</head>

  completed: JSON.parse(ls('mg_comp') || '{}'),
  showInstall: ls('mg_install_dismissed') !== '1',
};

function ls(k, v) {
  if (v === undefined) return localStorage.getItem(k);
  localStorage.setItem(k, v);
}
function save() {
  ls('mg_xp', S.xp);
  ls('mg_comp', JSON.stringify(S.completed));
}
function addXp(n) { S.xp += n; save(); }
function markDone(id) { S.completed[id] = true; save(); }

const LEVEL = () => Math.floor(S.xp / 100) + 1;
const XP_IN_LEVEL = () => S.xp % 100;
const TOTAL_DONE = () => Object.keys(S.completed).length;

// ═══════════════════════════════════════════════════════════
// SHUFFLE
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function navigate(page) {
  S.page = page;
  S.subPage = null;
  S.activeTheme = null;
  S.gr.selectedLesson = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  render();
  document.getElementById('main-screen').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════
function render() {
  const el = document.getElementById('main-screen');
  const navEl = document.getElementById('nav');
  // Hide nav on sub-pages
  const hideNav = ['flashcard', 'lesson-detail', 'exercise-run', 'exercise-result'].includes(S.subPage);
  navEl.style.display = hideNav ? 'none' : 'flex';
  el.style.paddingBottom = hideNav ? '20px' : '';

  if (S.page === 'home') el.innerHTML = renderHome();
  else if (S.page === 'vocab' && !S.subPage) el.innerHTML = renderVocab();
  else if (S.subPage === 'flashcard') el.innerHTML = renderFlashcard();
  else if (S.page === 'grammar' && !S.subPage) el.innerHTML = renderGrammar();
  else if (S.subPage === 'lesson-detail') el.innerHTML = renderLessonDetail();
  else if (S.page === 'exercise' && !S.subPage) el.innerHTML = renderExerciseSetup();
  else if (S.subPage === 'exercise-run') el.innerHTML = renderExerciseRun();
  else if (S.subPage === 'exercise-result') el.innerHTML = renderExerciseResult();
}

// ═══════════════════════════════════════════════════════════
// VOCAB
// ═══════════════════════════════════════════════════════════
function renderVocab() {
  const totalWords = Object.values(THEMES).reduce((a, t) => a + t.words.length, 0);
  const cards = Object.entries(THEMES).map(([key, th]) => {
    const done = th.words.filter((_, i) => S.completed[`v_${key}_${i}`]).length;
    const pct = Math.round((done / th.words.length) * 100);
    return `
      <button class="theme-card" onclick="openFlashcard('${key}')">
        <span class="theme-card-icon">${th.icon}</span>
        <div class="theme-card-info">
          <div class="theme-card-title" style="color:${th.color}">${th.label}</div>
          <div class="theme-card-sub">${done}/${th.words.length} mots • ${pct}%</div>
        </div>
        ${done === th.words.length ? '<span class="done-check">✅</span>' : `<span style="color:${th.color};font-weight:800">${pct}%</span>`}
        <div class="theme-progress-mini"><div class="theme-progress-fill" style="width:${pct}%;background:${th.color}"></div></div>
      </button>`;
  }).join('');

  return `
    <div class="page-header">
      <div class="page-title">📚 Vocabulaire</div>
      <div class="page-sub">${Object.keys(THEMES).length} thèmes • ${totalWords} mots au total</div>
    </div>
    <div class="theme-list">${cards}</div>
  `;
}

function openFlashcard(themeKey) {
  const th = THEMES[themeKey];
  const words = shuffle(th.words.map((w, i) => ({ ...w, origIdx: i })));
  S.activeTheme = themeKey;
  S.fc = { words, idx: 0, flipped: false, showPhonetic: false, known: [], unknown: [], done: false };
  S.subPage = 'flashcard';
  render();
}

// ═══════════════════════════════════════════════════════════
// FLASHCARD
// ═══════════════════════════════════════════════════════════
function renderFlashcard() {
  const th = THEMES[S.activeTheme];
  const fc = S.fc;

  if (fc.done) {
    return `
      <div class="result">
        <div class="result-emoji">${fc.known.length >= fc.words.length * 0.8 ? '🏆' : '📚'}</div>
        <h2 class="result-title">Session terminée !</h2>
        <div class="result-score">${fc.known.length}/${fc.words.length}</div>
        <p style="color:#4ECDC4;font-weight:700">✅ ${fc.known.length} mots sus</p>
        <p style="color:#FF6B6B;font-weight:700">❌ ${fc.unknown.length} à revoir</p>
        <p class="result-xp">+${fc.known.length * 5} XP gagnés !</p>
        <div class="btn-row">
          <button class="btn-secondary" onclick="openFlashcard('${S.activeTheme}')">🔄 Rejouer</button>
          <button class="btn-primary" onclick="navigate('vocab')" style="flex:1.5">Retour</button>
        </div>
      </div>`;
  }

  const word = fc.words[fc.idx];
  const isDone = S.completed[`v_${S.activeTheme}_${word.origIdx}`];
  const pct = Math.round(((fc.idx + 1) / fc.words.length) * 100);

  return `
    <div class="back-bar">
      <button class="back-btn" onclick="navigate('vocab')">← Vocabulaire</button>
      <span class="back-title">${th.icon} ${th.label}</span>
      ${isDone ? '<span class="back-badge">✅ Appris</span>' : ''}
    </div>
    <div class="fc-meta">
      <span>${fc.idx + 1}/${fc.words.length}</span>
      <div class="fc-track"><div class="fc-fill" style="width:${pct}%;background:${th.color}"></div></div>
      <span style="color:${th.color}">${pct}%</span>
    </div>

    <div class="card-wrap" onclick="fcFlip()">
      <div class="card" style="border-top-color:${th.color}">
        ${!fc.flipped ? `
          <div class="card-lang">🇲🇬 Malgache</div>
          <div class="card-word">${word.mg}</div>
          ${fc.showPhonetic ? `<div class="card-phonetic">/${word.ph}/</div>` : ''}
          <div class="card-hint">👆 Appuie pour révéler</div>
        ` : `
          <div class="card-lang">🇫🇷 Français</div>
          <div class="card-word">${word.fr}</div>
          <div class="card-translation">${word.mg}</div>
          <div class="card-phonetic">/${word.ph}/</div>
        `}
      </div>
    </div>

    <button class="phonetic-btn" onclick="fcTogglePhonetic()">
      ${fc.showPhonetic ? '🔇 Cacher prononciation' : '🔊 Voir prononciation'}
    </button>

    ${fc.flipped ? `
      <div class="fc-actions">
        <button class="fc-btn fc-btn-bad" onclick="fcAnswer(false)">❌ À revoir</button>
        <button class="fc-btn fc-btn-good" onclick="fcAnswer(true)">✅ Je sais !</button>
      </div>
    ` : ''}
  `;
}

function fcFlip() { S.fc.flipped = !S.fc.flipped; render(); }
function fcTogglePhonetic() { S.fc.showPhonetic = !S.fc.showPhonetic; render(); }
function fcAnswer(wasKnown) {
  const fc = S.fc;
  const word = fc.words[fc.idx];
  if (wasKnown) {
    markDone(`v_${S.activeTheme}_${word.origIdx}`);
    addXp(5);
    fc.known.push(fc.idx);
  } else {
    fc.unknown.push(fc.idx);
  }
  fc.flipped = false;
  fc.showPhonetic = false;
  if (fc.idx + 1 >= fc.words.length) fc.done = true;
  else fc.idx++;
  render();
}

function renderLessonDetail() {
  const l = GRAMMAR_LESSONS.find(x => x.id === S.gr.selectedLesson);
  const done = S.completed[`g_${l.id}`];

  const contentHtml = l.content.map(c => {
    if (c.type === 'text') {
      const html = c.text.replace(/\*\*(.+?)\*\*/g, '<strong class="highlight">$1</strong>');
      return `<p>${html}</p>`;
    }
    if (c.type === 'example') {
      return `<div style="background:var(--surf2);border-radius:12px;padding:12px;margin:8px 0">
        <div style="font-size:18px;font-weight:800;color:var(--accent)">${c.mg}</div>
        <div style="color:var(--text);margin:4px 0">${c.fr}</div>
        ${c.note ? `<div style="color:var(--muted);font-size:12px;font-style:italic">${c.note}</div>` : ''}

    }
    if (c.type === 'bullet') {

        return `<div class="bullet"><span style="color:${l.color}">→</span><span>${html}</span></div>`;

  return `

      <span class="back-title">${l.icon} ${l.title}</span>
    </div>

      ${contentHtml}

        <button class="btn-primary" style="margin-top:16px;background:${l.color}" onclick="completeLesson('${l.id}')">
          ✅ Leçon apprise ! (+15 XP)
        </button>` : `
        <div style="text-align:center;color:#4ECDC4;font-weight:800;margin-top:16px">✅ Leçon complétée !</div>`}
    </div>
  `;
}

function completeLesson(id) {

}

// Build classic questions from vocab
function buildClassicQuestions(diff) {
  const allWords = [];
  Object.entries(THEMES).forEach(([key, th]) => {
    th.words.forEach((w, i) => allWords.push({ ...w, themeKey: key, themeLabel: th.label, origIdx: i }));
  });
  const pool = shuffle(allWords).slice(0, diff * 30);
  const questions = [];

  pool.forEach(word => {
    // mg→fr
    const wrongsMgFr = shuffle(pool.filter(w => w.fr !== word.fr)).slice(0, 3).map(w => w.fr);
    if (wrongsMgFr.length === 3) {
      questions.push({
        type: 'mg_to_fr', q: `Que signifie "${word.mg}" ?`,
        answer: word.fr, theme: word.themeLabel,
        choices: shuffle([word.fr, ...wrongsMgFr])
      });
    }
    // fr→mg
    const wrongsFrMg = shuffle(pool.filter(w => w.mg !== word.mg)).slice(0, 3).map(w => w.mg);
    if (wrongsFrMg.length === 3) {
      questions.push({
        type: 'fr_to_mg', q: `Comment dit-on "${word.fr}" en malgache ?`,
        answer: word.mg, theme: word.themeLabel,
        choices: shuffle([word.mg, ...wrongsFrMg])
      });
    }
  });

  return shuffle(questions).slice(0, 10);
}

function startClassicExercise() {
  const qs = buildClassicQuestions(S.ex.difficulty);
  S.ex = { ...S.ex, started: true, questions: qs, qIdx: 0, selected: null, score: 0, done: false, aiLoading: false };
  S.subPage = 'exercise-run';
  render();
}

// ═══════════════════════════════════════════════════════════
// AI EXERCISE
// ═══════════════════════════════════════════════════════════
async function startAiExercise() {
  const themeKey = document.getElementById('ai-theme').value;
  const exType = document.getElementById('ai-type').value;
  const count = parseInt(document.getElementById('ai-count').value);
  const th = themeKey === 'all' ? null : THEMES[themeKey];

  // Build context
  let vocabContext = '';
  if (th) {
    vocabContext = th.words.slice(0, 20).map(w => `${w.mg} = ${w.fr}`).join(', ');
  } else {
    Object.entries(THEMES).slice(0, 5).forEach(([k, t]) => {
      vocabContext += t.label + ': ' + t.words.slice(0, 5).map(w => `${w.mg}=${w.fr}`).join(', ') + '. ';
    });
  }

  const typeInstr = {
    mixed: 'Mix de questions malgache→français, français→malgache et grammaire.',
    mg_to_fr: 'Uniquement questions "Que signifie X en malgache ?" avec réponse en français.',
    fr_to_mg: 'Uniquement questions "Comment dit-on X en malgache ?".',
    grammar: 'Uniquement questions sur la grammaire malgache (ordre des mots, temps, négation, pronoms, etc.).',
  }[exType];

  const prompt = `Tu es un expert en langue malgache. Génère exactement ${count} questions QCM pour apprendre le malgache.

Vocabulaire de référence: ${vocabContext}
${th ? `Thème: ${th.label}` : 'Tous les thèmes'}
Type: ${typeInstr}

Réponds UNIQUEMENT en JSON valide, sans markdown, ce format exact:
{"questions":[{"q":"question","answer":"réponse correcte","choices":["A","B","C","D"],"theme":"thème","type":"mg_to_fr"}]}

Règles:
- choices doit avoir EXACTEMENT 4 éléments dont answer
- Mets answer à une position aléatoire dans choices
- Les mauvaises réponses doivent être plausibles
- Thèmes variés si pas de filtre
- Questions progressives`;

  // Show loading
  S.subPage = 'exercise-run';
  S.ex.aiLoading = true;
  S.ex.questions = [];
  render();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    const questions = parsed.questions || [];

    S.ex = { ...S.ex, aiLoading: false, questions, qIdx: 0, selected: null, score: 0, done: false };
    render();
  } catch (e) {
    // Fallback to classic
    S.ex.aiLoading = false;
    const qs = buildClassicQuestions(2);
    S.ex = { ...S.ex, questions: qs, qIdx: 0, selected: null, score: 0, done: false };
    render();
  }
}

// ═══════════════════════════════════════════════════════════
// EXERCISE RUN
// ═══════════════════════════════════════════════════════════
function renderExerciseRun() {
  if (S.ex.aiLoading) {
    return `
      <div class="back-bar">
        <button class="back-btn" onclick="navigate('exercise')">← Exercices</button>
        <span class="back-title">Génération IA…</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px">
        <div style="font-size:48px">🤖</div>
        <p style="color:var(--muted)">L'IA génère vos exercices…</p>
        <div class="loading-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
  }

  if (S.ex.done) return renderExerciseResult();

  const q = S.ex.questions[S.ex.qIdx];
  if (!q) return renderExerciseResult();
  const pct = Math.round((S.ex.qIdx / S.ex.questions.length) * 100);

  return `
    <div class="back-bar">
      <button class="back-btn" onclick="navigate('exercise')">← Exercices</button>
      <span class="back-title">Q${S.ex.qIdx+1}/${S.ex.questions.length}</span>
      <span class="back-badge" style="color:#FFD93D">⭐ ${S.ex.score * 10} XP</span>
    </div>
    <div class="ex-progress"><div class="ex-fill" style="width:${pct}%"></div></div>

    <div class="q-card">
      <div class="q-theme">📌 ${q.theme || 'Vocabulaire'}</div>
      <h2 class="q-text">${q.q}</h2>
    </div>

    <div class="choices">
      ${(q.choices || []).map(c => {
        let cls = 'choice';
        if (S.ex.selected !== null) {
          if (c === q.answer) cls += ' correct';
          else if (c === S.ex.selected) cls += ' wrong';
        }
        return `<button class="${cls}" onclick="answerEx('${escHtml(c)}')" ${S.ex.selected ? 'disabled' : ''}>${c}</button>`;
      }).join('')}
    </div>
  `;
}

function escHtml(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function answerEx(choice) {
  if (S.ex.selected !== null) return;
  const q = S.ex.questions[S.ex.qIdx];
  S.ex.selected = choice;
  if (choice === q.answer) { S.ex.score++; addXp(10); }
  render();
  setTimeout(() => {
    if (S.ex.qIdx + 1 >= S.ex.questions.length) {
      S.ex.done = true;
    } else {
      S.ex.qIdx++;
      S.ex.selected = null;
    }
    render();
  }, 1100);
}

// ═══════════════════════════════════════════════════════════
// EXERCISE RESULT
// ═══════════════════════════════════════════════════════════
function renderExerciseResult() {
  const { score, questions } = S.ex;
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '😊' : '📚';
  const msg = pct === 100 ? 'Parfait ! 🎉' : pct >= 80 ? 'Excellent résultat ! 💪' : pct >= 60 ? 'Bon travail, continue ! 🌿' : 'Continue à pratiquer ! 🌱';

  return `
    <div class="result">
      <div class="result-emoji">${emoji}</div>
      <h2 class="result-title">Quiz terminé !</h2>
      <div class="result-score">${score}/${total}</div>
      <p class="result-xp">+${score * 10} XP gagnés !</p>
      <p class="result-msg">${msg}</p>
      <div class="btn-row">
        <button class="btn-secondary" onclick="navigate('exercise')">Reconfigurer</button>
        <button class="btn-primary" onclick="startClassicExercise()">🔄 Rejouer</button>
      </div>
      <button class="btn-primary" style="margin-top:8px;background:var(--teal)" onclick="startAiExerciseAgain()">🤖 Nouveaux avec IA</button>
    </div>`;
}

function startAiExerciseAgain() {
  S.subPage = null;
  navigate('exercise');
}
